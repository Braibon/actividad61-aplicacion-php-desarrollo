name: CI/CD DevOps Pipeline

# Se activará cada vez que se ejecuta un "git push" en el repositorio
on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v3

      # 2. Inicio de sesión en DockerHub
      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1 y 2. Construcción de la imagen (BUILD) y subida (PUSH)
      - name: Construcción (BUILD) y Entrega Continua (PUSH)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: braibon/actividad61-aplicacion-crud-php:latest

      # 3 y 4. Conexión remota por SSH y Despliegue en AWS
      - name: Conexión SSH y Despliegue en Producción (PULL & RUN)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd ~/actividad61-aplicacion-php-produccion
            docker-compose pull
            docker-compose down
            docker-compose up -d